

{%  load static %}
<aside class="sidebar" data-sidebar>

   {% for pro in profile %}
<div class="sidebar-info">
  <figure class="avatar-box">
    <img src="{% static 'images/memoji.png' %}" alt="Richard hanrick" width="80">
  </figure>

  <div class="info-content">
    <h1 class="name" title="Richard hanrick">< {{pro.name}} /></h1>

    <p class="title">Cybernerd</p>
  </div>

  <button class="info_more-btn" data-sidebar-btn>
    <span>Show Contacts</span>

    <ion-icon name="chevron-down"></ion-icon>
  </button>

</div>

<div class="sidebar-info_more">

  <div class="separator"></div>

  <ul class="contacts-list">

    <li class="contact-item">

      <div class="icon-box">
        <ion-icon name="mail-outline"></ion-icon>
      </div>

      <div class="contact-info">
        <!-- <p class="contact-title">Email</p> -->

        <a href="mailto:{{pro.email}}" class="contact-link">{{pro.index_email}}</a>
      </div>

    </li>

    <li class="contact-item">

      <div class="icon-box">
        <ion-icon name="phone-portrait-outline"></ion-icon>
      </div>

      <div class="contact-info">
        <!-- <p class="contact-title">Phone</p> -->

        <a href="tel:{{pro.phone}}" class="contact-link">{{pro.index_phone}}</a>
      </div>

    </li>

    <li class="contact-item">

      <div class="icon-box">
      <ion-icon name="logo-linkedin"></ion-icon>
      </div>

      <div class="contact-info">
      <a href="{{pro.linkedin}}" class="contact-link" target="_blank">{{pro.index_linkedin}}</a>
      </div>

    </li>

    <li class="contact-item">

      <div class="icon-box">
      <ion-icon name="logo-github"></ion-icon>
      </div>

      <div class="contact-info">
        <!-- <p class="contact-title" hidden>Location</p> -->

        <!-- <address >Sacramento, California, USA</address> -->
        <a href="{{pro.git}}" class="contact-link" target="_blank">{{pro.index_git}}</a>
      </div>

    </li>

  </ul>

  <div class="separator"></div>

  <!-- <ul class="social-list">

    <li class="social-item">
      <a href="#" class="social-link">
        <ion-icon name="logo-facebook"></ion-icon>
      </a>
    </li>

    <li class="social-item">
      <a href="#" class="social-link">
        <ion-icon name="logo-twitter"></ion-icon>
      </a>
    </li>

    <li class="social-item">
      <a href="#" class="social-link">
        <ion-icon name="logo-instagram"></ion-icon>
      </a>
    </li>

  </ul> -->

</div>

{% endfor %}
</aside>
